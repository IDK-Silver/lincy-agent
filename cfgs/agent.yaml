# App-level runtime settings
app:
  agent_os_dir: "~/Library/Mobile Documents/com~apple~CloudDocs/Lincy"
  timezone: "UTC+8" # supports fixed offsets (UTC+8) or IANA names (Asia/Taipei)
  warn_on_failure: false
  turn_failure_requeue_limit: 2 # after in-turn LLM retries are exhausted, re-enqueue inbound once
  turn_failure_requeue_delay_seconds: 5
  requeue_non_retryable_turn_failures: true # also replay request-format/provider-api/context-length failures instead of acking them away
  openrouter_site_name: "Lincy"
  # Control API (for supervisor integration)
  control:
    enabled: true
    host: "127.0.0.1"
    port: 9001

# CLI/TUI display settings
tui:
  debug: true
  show_tool_use: true
  replay_turns: null # resume 時顯示最近 N 輪，null = 全部
  show_tool_calls: true # resume 時是否顯示 tool call 細節

# Context window management
context:
  soft_max_prompt_tokens: 256000
  preserve_turns: 4
  # Core rules: high attention weight, injected as system message
  boot_files:
    - "memory/agent/persona.md"
    - "memory/agent/long-term.md"
    - "kernel/builtin-skills/index.md"
    - "personal-skills/index.md"
  # Background reference: injected as synthetic tool result
  boot_files_as_tool:
    - "memory/agent/index.md"
    - "memory/agent/temp-memory.md"
  skill_rescan: false # disable runtime skill rescan to avoid cache miss from index rebuild
  # Time-anchored common ground:
  # when a queued inbound message is processed after this scope's shared context changed,
  # inject a synthetic tool-result block describing what was already shared at message time.
  common_ground:
    enabled: true
    max_entries: 8 # most recent shared messages to include (still filtered by rev<=anchor)
    max_chars: 800 # char budget for the injected common-ground block
    max_entry_chars: 100 # per-entry body truncation before block assembly
    persist_cache: true # persist shared_state.json state under state/

# Daily maintenance window
maintenance:
  enabled: true
  daily_hour: 3 # 03:00 local time
  latest_hour: 6 # must complete by 06:00
  retry_interval_minutes: 10 # retry if queue busy
  # Steps in execution order: archive → context_refresh → backup → session_file_cleanup
  archive:
    retain_days: 3
  context_refresh:
    preserve_turns: 4
  backup:
    enabled: true
    interval_minutes: 300
    retention_minutes: 1440
  session_file_cleanup:
    enabled: true
    retention_days: 90

# Feature flags
features:
  copilot:
    initiator_policy:
      use_default_human_entry_rules: false
      human_entry_rules:
        - channel: cli
        - channel: gmail
        - channel: line
        - channel: discord
          metadata_equals:
            source: dm_immediate
  codex_remote_compaction:
    enabled: true
  icloud_sync_awareness:
    enabled: false
  send_message_batch_guidance:
    enabled: false
  format_reminders:
    discord: false
    gmail: false
    memory: false
  decision_reminder:
    enabled: false
    inline_section:
      file: "memory/agent/long-term.md"
      header: "## 核心價值"
    files:
      - "memory/agent/long-term.md"

# Channel adapters
channels:
  gmail:
    enabled: true
    poll_interval: 5 # seconds between inbox polls
    max_age_minutes: null # null = no limit; set to e.g. 30 to skip old emails
    thread_max_age_days: 7 # stale threshold for thread continuation (days)
    ignore_senders: # substring match, auto-archive without processing
      - "@facebookmail.com"
      - "noreply@"
      - "no-reply@"
      - "@accounts.google.com"
  discord:
    enabled: true
    debounce_seconds: 5
    max_wait_seconds: 30
    dm_debounce_seconds: 18 # DM waits longer before assuming you're done
    dm_max_wait_seconds: 180 # hard cap for one DM burst (slow typers)
    dm_typing_quiet_seconds: 35 # quiet time after last typing event
    send_delay_min: 1.0
    send_delay_max: 3.0
    send_typing_refresh_seconds: 7 # typing indicator refresh during send phase
    send_typing_cps_min: 14.0 # min chars/sec for typing speed simulation
    send_typing_cps_max: 26.0 # max chars/sec for typing speed simulation
    send_delay_char_max: 8.0 # max delay (sec) from character count alone
    send_delay_total_max: 20.0 # absolute cap (sec) on total pre-send delay
    listen_dms: true
    listen_channels: [] # optional hard allowlist / bootstrap seeds
    ignore_users: []
    guild_review_interval_seconds: 60
    presence_mode: auto # off | auto | keep_online (auto only bumps online)
    presence_refresh_seconds: 90 # refresh Discord presence periodically
    presence_idle_after_seconds: 300 # reserved (auto currently does not force idle)
    auto_download_attachment_max_mb: 25
    auto_read_images: true
    auto_read_images_in_dm: true
    auto_read_images_in_guild: true
    auto_read_image_max_per_batch: 3
    auto_read_image_max_mb: 10

# Autonomous heartbeat
heartbeat:
  enabled: true
  enqueue_startup: false # default false; true to enqueue immediate [STARTUP] on launch
  enqueue_upgrade_notice: true # default true; enqueue kernel upgrade summary even when startup heartbeat is disabled
  interval: "35m-55m" # format: "<n>[m|h]-<n>[m|h]", e.g. "3m-5m", "2h-5h", "1h-30m"
  # interval: "1h-30m"
  quiet_hours: # suppress heartbeat during these windows (local time)
    - "00:00-7:30"

# Tool security
tools:
  max_tool_iterations: 50 # max tool call iterations per turn
  allowed_paths:
    - "~"
    - "/tmp"
  shell:
    blacklist:
      - "rm\\s+-rf\\s+/"
      - ":(\\s*)\\{\\s*:\\|:\\s*&\\s*\\}\\s*;"
      - "mkfs\\."
      - "dd\\s+if=.*/dev/(zero|random)"
      - "> /dev/sd"
      - "^python[3]?\\s"
      - "^pip[3]?\\s"
    timeout: 1200
    task_max_concurrency: 2
    export_env: # keys from .env to inject into shell subprocess
      - LITELLM_API_KEY
    handoff:
      enabled: true
      tail_lines: 8 # inspect the last N output lines
      grace_seconds: 1.5 # wait briefly before classifying input prompts
      rules:
        # Common browser/device-code style auth flows:
        # gws auth login, gcloud auth login, gh auth login, codex login --device-auth, etc.
        - id: auth_browser_url
          outcome: waiting_external_action
          require_url: true
          any_text:
            - "(?i)(open|visit|browse|go to|navigate).{0,40}(browser|url|link)"
            - "(?i)(log.?in|sign.?in|authori[sz]|verif|approv|device.code|one.time)"
          process_alive: true
        - id: auth_code_prompt
          outcome: waiting_user_input
          any_text:
            - "(?i)(authori[sz]ation|verification|device|one.time).{0,20}(code|token)"
            - "(?i)(enter|paste|type|input).{0,30}(code|token)"
          prompt_suffix:
            - ":"
            - "?"
            - "> "
          process_alive: true
          idle_seconds_ge: 1.0
        - id: press_enter_to_continue
          outcome: waiting_user_input
          any_text:
            - "(?i)(press|hit).{0,10}enter"
          process_alive: true
          idle_seconds_ge: 1.0
        - id: interactive_menu_prompt
          outcome: waiting_user_input
          any_text:
            - "(?i)use arrows to move"
            - "(?i)type to filter"
            - "(?i)select an option"
            - "(?i)choose (one|an option)"
          process_alive: true
          idle_seconds_ge: 1.0
  memory_edit:
    allow_failure: true
    turn_retry_limit: 3 # responder turn-level retry when memory_edit tool result is failed
    warnings:
      max_lines: 150
      ignore:
        - "temp-memory.md"
        - "index.md"
        - "archive/"
  memory_search:
    bm25:
      top_k: 8
      snippet_lines: 3
      max_snippets_per_file: 3
      max_response_chars: 1200
      date_normalization: true
      exclude:
        - "memory/agent/temp-memory.md"
        - "memory/agent/persona.md"
        - "memory/agent/long-term.md"
  apple_apps:
    enabled: true
    timeout_seconds: 30
    max_search_results: 25
    photos_export_dir: "tmp/photos-exports"
    mail_export_dir: "tmp/mail-attachments"
  web_search:
    enabled: true
    timeout: 10
    api_key_env: TAVILY_API_KEY
    default_max_results: 5
    max_results_limit: 5
    include_raw_content: false # raw page text can explode prompt size
  web_fetch:
    enabled: true
    timeout: 60
    default_max_chars: 100000
    max_response_chars: 100000
    max_response_bytes: 10485760 # 10 MB
    user_agent: "chat-agent-web-fetch/1.0"
    allow_private_hosts: false
    summarize_with_llm: true
  scroll:
    invert: false
    max_amount: 7
  memory_sync:
    every_n_turns: 3
    max_retries: 1
  skill_governance:
    external_skills_dir: "~/.agents/skills"
    rules:
      - skill: discord-messaging
        tool: send_message
        when:
          channel: discord
        enforcement: require_context

# Agents
agents:
  brain:
    llm: cfgs/llm/claude_code/claude-opus-4.8/thinking.yaml
    llm_fallbacks:
      - cfgs/llm/codex/gpt-5.5/thinking.yaml
      - cfgs/llm/deepseek/deepseek-v4-pro/thinking.yaml
      - cfgs/llm/codex/gpt-5.4/thinking.yaml
      - cfgs/llm/codex/gpt-5.3-codex/thinking.yaml
    llm_request_timeout: 180
    llm_transient_retries: 3
    warn_on_failure: true
    use_own_vision_ability: false
    cache:
      enabled: true
      ttl: "24h"
    staged_planning:
      enabled: false
      gather_max_iterations: 4
      plan_context_files:
        - "memory/agent/long-term.md"
        - "kernel/builtin-skills/index.md"
        - "personal-skills/index.md"

  init:
    llm: cfgs/llm/codex/gpt-5.5/thinking.yaml
    llm_request_timeout: 120
    llm_transient_retries: 1
    warn_on_failure: true

  web_fetch_summarizer:
    enabled: true
    llm: cfgs/llm/codex/gpt-5.5/low-thinking.yaml
    llm_request_timeout: 30
    llm_transient_retries: 1
    warn_on_failure: true

  vision:
    enabled: true
    llm: cfgs/llm/codex/gpt-5.5/no-thinking.yaml
    llm_request_timeout: 60
    llm_transient_retries: 1
    warn_on_failure: true

  skill_checker:
    enabled: false
    llm: cfgs/llm/codex/gpt-5.4-mini/no-thinking.yaml
    llm_request_timeout: 30
    llm_transient_retries: 1
    warn_on_failure: true

  conscience:
    enabled: false
    llm: cfgs/llm/codex/gpt-5.4-mini/no-thinking.yaml
    llm_request_timeout: 30
    llm_transient_retries: 1
    warn_on_failure: true

  worker:
    enabled: true
    llm: cfgs/llm/codex/gpt-5.5/thinking.yaml
    llm_request_timeout: 180
    llm_transient_retries: 2
    warn_on_failure: true
    max_turns: 30
    max_context_tokens: 96000
    excluded_tools:
      - gui_task
      - screenshot
      - screenshot_by_subagent
    cache:
      enabled: true
      ttl: "1h"

  memory_editor:
    enabled: true
    llm: cfgs/llm/codex/gpt-5.5/no-thinking.yaml
    llm_fallbacks:
      - cfgs/llm/deepseek/deepseek-v4-flash/no-thinking.yaml
      - cfgs/llm/codex/gpt-5.4-mini/no-thinking.yaml
      - cfgs/llm/codex/gpt-5.3-codex/no-thinking.yaml
    llm_request_timeout: 120
    llm_transient_retries: 2 # transport/transient retry (timeout, 5xx, malformed provider payload)
    llm_rate_limit_retries: 5 # 429 retry with Retry-After/backoff
    warn_on_failure: true
    post_parse_retries: 2 # planner JSON/schema parse retry (different layer from transport retry)

  gui_manager:
    enabled: false
    llm: cfgs/llm/codex/gpt-5.5/thinking.yaml
    llm_request_timeout: 180
    llm_transient_retries: 20
    warn_on_failure: true
    max_steps: 50 # GUI agentic loop 最大步數
    allow_wait_tool: false # false = disable wait tool
    step_delay_min: 0.1 # min forced delay (sec) after each tool step
    step_delay_max: 0.3 # max forced delay (sec); random in [min, max]
    gui_intent_max_chars: null # gui_task 意圖顯示截斷
    gui_instruction_max_chars: null # ask_worker 指令顯示截斷（null=不截斷）
    gui_text_max_chars: null # type_text 文字顯示截斷（null=不截斷）
    gui_worker_result_max_chars: null # worker 觀察結果顯示截斷（null=不截斷）
    gui_result_max_chars: null # 一般結果顯示截斷（null=不截斷）
    screenshot_max_width: 1000 # 截圖最大寬度（等比縮放）
    screenshot_quality: 70 # JPEG 壓縮品質（1-100）
    allow_direct_screenshot: false # true = manager LLM 可直接看截圖

  gui_worker:
    enabled: false
    llm: cfgs/llm/codex/gpt-5.5/no-thinking.yaml
    llm_request_timeout: 60
    llm_transient_retries: 1
    warn_on_failure: true
