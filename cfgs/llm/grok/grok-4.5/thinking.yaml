provider: grok
model: grok-4.5

# Local SuperGrok OAuth proxy (uv run grok-proxy login && serve).
# Client appends /chat/completions.
base_url: http://localhost:4144/v1

# Generous cap for agent tool loops; adjust if needed.
max_tokens: 65536
request_timeout: 600.0
temperature: null
vision: true

# grok-4.5 reasoning cannot be fully disabled; high is the official default.
reasoning:
  enabled: true
  effort: high
  supported_efforts:
    - low
    - medium
    - high
