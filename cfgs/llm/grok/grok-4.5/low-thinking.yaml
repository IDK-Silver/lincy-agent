provider: grok
model: grok-4.5

# Local SuperGrok OAuth proxy (uv run grok-proxy login && serve).
base_url: http://localhost:4144/v1

max_tokens: 65536
request_timeout: 600.0
temperature: null
vision: true

# Lowest documented effort for grok-4.5 (reasoning cannot be fully disabled).
reasoning:
  enabled: true
  effort: low
  supported_efforts:
    - low
    - medium
    - high
