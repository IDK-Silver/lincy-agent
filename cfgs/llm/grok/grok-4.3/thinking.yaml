provider: grok
model: grok-4.3

# Local SuperGrok OAuth proxy (uv run grok-proxy login && serve).
base_url: http://localhost:4144/v1

max_tokens: 65536
request_timeout: 600.0
temperature: null
vision: true

reasoning:
  enabled: true
  effort: high
  supported_efforts:
    - none
    - low
    - medium
    - high
