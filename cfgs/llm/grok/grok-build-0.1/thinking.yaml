provider: grok
model: grok-build-0.1

# SuperGrok / X Premium+ OAuth coding model (subscription path, not API key).
# Local proxy: uv run grok-proxy login && serve.
base_url: http://localhost:4144/v1

max_tokens: 65536
request_timeout: 600.0
temperature: null
vision: true

# Effort levels follow xAI Chat Completions reasoning_effort passthrough.
# If a given effort is rejected upstream, drop to a lower supported value.
reasoning:
  enabled: true
  effort: high
  supported_efforts:
    - none
    - low
    - medium
    - high
