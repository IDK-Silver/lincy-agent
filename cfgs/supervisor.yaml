server:
  host: "127.0.0.1"
  port: 9000

restart:
  enabled: false
  interval_hours: 12

processes:
  copilot-proxy:
    enabled: auto
    auto_enable_when_any_agent_uses_provider: copilot
    command: ["uv", "run", "proxy", "copilot", "serve"]
    cwd: "."
    auto_restart: true
    startup_delay: 1
    health_check_url: "http://127.0.0.1:4141/health"
    health_check_timeout: 30
    log_output: true

  codex-proxy:
    enabled: auto
    auto_enable_when_any_agent_uses_provider: codex
    command: ["uv", "run", "proxy", "codex", "serve"]
    cwd: "."
    auto_restart: true
    startup_delay: 1
    health_check_url: "http://127.0.0.1:4143/health"
    health_check_timeout: 30
    log_output: true

  claude-code-proxy:
    enabled: auto
    auto_enable_when_any_agent_uses_provider: claude_code
    command: ["uv", "run", "proxy", "claude-code", "serve"]
    cwd: "."
    auto_restart: true
    startup_delay: 1
    health_check_url: "http://127.0.0.1:4142/health"
    health_check_timeout: 30
    log_output: true

  grok-proxy:
    enabled: auto
    auto_enable_when_any_agent_uses_provider: grok
    command: ["uv", "run", "proxy", "grok", "serve"]
    cwd: "."
    auto_restart: true
    startup_delay: 1
    health_check_url: "http://127.0.0.1:4144/health"
    health_check_timeout: 30
    log_output: true

  chat-web-ui-build:
    enabled: true
    command: ["bun", "run", "build"]
    cwd: "src/chat_web_ui"
    auto_restart: false # oneshot: run once then stop
    shutdown_timeout: 60
    log_output: true

  ax-server-build:
    enabled: true
    command: ["uv", "run", "python", "-m", "lincy.gui.ax_runtime"]
    cwd: "."
    auto_restart: false # oneshot: build/cache OpenComputerUse if missing
    shutdown_timeout: 600 # first build takes minutes; cached runs are instant
    log_output: true

  chat-web-api:
    enabled: true
    command: ["uv", "run", "chat-web-api", "serve"]
    cwd: "."
    auto_restart: true
    startup_delay: 1
    health_check_url: "http://127.0.0.1:9002/health"
    health_check_timeout: 30
    depends_on: ["chat-web-ui-build"] # wait for frontend build
    log_output: true

  chat-cli:
    enabled: true
    command: ["uv", "run", "chat-cli"]
    cwd: "."
    control_url: "http://127.0.0.1:9001"
    shutdown_timeout: 1200
    auto_restart: true
    join_restart_cycle: true
    depends_on: ["copilot-proxy", "codex-proxy", "claude-code-proxy", "grok-proxy", "chat-web-api", "ax-server-build"]
    log_output: false
    start_new_session: false

upgrade:
  auto_check: true
  check_interval_minutes: 1
  branch: "main"
  post_pull: ["uv", "sync"]
  self_watch_paths: ["src/chat_supervisor/"]
